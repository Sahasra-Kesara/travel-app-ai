<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recommendations</title>
    <link href="{{ url_for('static', filename='css/tailwind.css') }}" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-3xl font-bold mb-6">Recommended Destinations</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        {% for rec in results %}
        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-xl font-semibold">{{ rec.destination.name }}</h2>
            <p>{{ rec.summary }}</p>
            <p class="mt-2 font-medium">Best time to visit: {{ rec.destination.best_time_to_visit }}</p>
            <p>Activities: {{ rec.destination.activities | join(', ') }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
