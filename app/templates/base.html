<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Travel AI{% endblock %}</title>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    .trip-step-icon{
        background:#2563eb;
        color:white;
        font-weight:bold;
        width:30px;
        height:30px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        box-shadow:0 4px 8px rgba(0,0,0,.3);
    }
    </style>

</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 shadow flex justify-between">
        <a href="{{ url_for('user.home') }}" class="font-bold text-lg">Travel AI</a>
        <div>
            <a href="{{ url_for('user.home') }}" class="mr-4 hover:underline">Home</a>
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1 p-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-200 text-gray-700 text-center p-4">
        &copy; 2026 Travel AI. All rights reserved.
    </footer>

</body>
</html>
