{% extends "base.html" %}
{% block title %}Home - Travel AI{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-3xl font-bold mb-4">Search Your Travel Destination</h1>
    <form action="{{ url_for('user.search') }}" method="POST" class="flex flex-col md:flex-row gap-4">
        <input type="text" name="query" placeholder="Enter your travel query..." 
               class="flex-1 p-3 border rounded" required>
        <button class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition">
            Search
        </button>
    </form>
</div>
{% endblock %}
