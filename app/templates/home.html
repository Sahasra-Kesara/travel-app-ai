<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-blue-50 min-h-screen flex flex-col">

<!-- Navbar -->
<nav class="bg-white/80 backdrop-blur shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold text-blue-600">
            🤖 Travel AI
        </h1>
        <div class="space-x-6">
            <a href="{{ url_for('user.home') }}" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
            <a href="#" class="text-gray-700 hover:text-blue-600 font-medium">About</a>
            <a href="#" class="text-gray-700 hover:text-blue-600 font-medium">Contact</a>
        </div>
    </div>
</nav>

<!-- Main Chat Container -->
<main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

        <!-- Chat Header -->
        <div class="bg-blue-600 text-white px-6 py-4">
            <h2 class="text-xl font-semibold">Travel AI Assistant</h2>
            <p class="text-sm opacity-90">
                English | සිංහල දෙකෙන්ම ඔබට උදව් කරමි 🇱🇰
            </p>
        </div>

        <!-- Chat Messages -->
        <div class="flex-1 p-6 space-y-4 overflow-y-auto bg-gray-50">

            <!-- AI Message -->
            <div class="flex items-start gap-3">
                <div class="bg-blue-600 text-white rounded-full w-9 h-9 flex items-center justify-center font-bold">
                    AI
                </div>
                <div class="bg-white shadow rounded-2xl px-4 py-3 max-w-xl">
                    <p class="text-gray-800 font-medium">
                        👋 Hello! I’m your Travel AI Assistant.
                    </p>
                    <p class="text-gray-600 text-sm mt-1">
                        ඔබට යන්න හිතෙන තැන්, මාර්ග, හෝ සංචාර උපදෙස් ගැන
                        English හෝ සිංහලෙන් අහන්න.
                    </p>
                </div>
            </div>

            <!-- Example User Prompt -->
            <div class="flex justify-end">
                <div class="bg-blue-100 text-blue-900 rounded-2xl px-4 py-3 max-w-xl">
                    Ella යන්න හොඳම කාලය මොකද්ද?
                </div>
            </div>

        </div>

        <!-- Chat Input -->
        <form action="{{ url_for('user.search') }}" method="POST"
              class="border-t bg-white px-4 py-4 flex gap-3">

            <input
                type="text"
                name="query"
                placeholder="Ask in English or සිංහලෙන් අහන්න..."
                class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700"
            />

            <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition">
                Send
            </button>
        </form>

    </div>
</main>

<!-- Footer -->
<footer class="text-center text-gray-500 text-sm py-6">
    © 2026 Travel AI • Smart Travel with AI ✨
</footer>

</body>
</html>
