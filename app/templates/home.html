<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel AI</title>
    <link href="{{ url_for('static', filename='css/tailwind.css') }}" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Search Your Travel Destination</h1>
        <form action="{{ url_for('user.search') }}" method="POST" class="mb-4">
            <input type="text" name="query" placeholder="Enter your travel query..."
                   class="w-full p-2 border rounded mb-2"/>
            <button class="bg-blue-500 text-white px-4 py-2 rounded">Search</button>
        </form>
    </div>
</body>
</html>
