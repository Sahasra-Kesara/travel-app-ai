{% extends "base.html" %}
{% block content %}

<section class="h-screen flex">

  <!-- LEFT PANEL -->
  <div class="w-full md:w-1/3 bg-white p-6 overflow-y-auto">
    <h1 class="text-3xl font-bold text-blue-600 mb-4">
      Plan Your Trip ✈️
    </h1>

    <form id="tripForm" class="mb-4">
      <input id="startCity" placeholder="Start city" class="w-full p-3 border rounded-xl mb-2"/>
      <input id="endCity" placeholder="Destination city" class="w-full p-3 border rounded-xl mb-3"/>
      <button class="w-full py-3 bg-blue-600 text-white rounded-xl">Generate Route</button>
    </form>

    <div id="tripSteps" class="space-y-3"></div>
  </div>

  <!-- MAP -->
  <div class="flex-1 relative">
    <div id="tripMap" class="absolute inset-0"></div>

    <!-- STOP DETAILS CARD -->
    <div id="stopCard"
         class="absolute bottom-6 left-1/2 -translate-x-1/2
                w-96 bg-white rounded-2xl shadow-xl p-5 hidden">
      <h3 id="scTitle" class="font-bold text-lg text-blue-600"></h3>
      <p id="scDesc" class="text-sm text-gray-700 mt-2"></p>
      <p class="text-sm mt-2">⏰ <span id="scTime"></span></p>
      <button onclick="closeStopCard()" class="mt-3 px-4 py-2 bg-gray-100 rounded-lg text-sm">
        Close
      </button>
    </div>
  </div>

</section>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/customer_trip.js') }}"></script>

{% endblock %}
